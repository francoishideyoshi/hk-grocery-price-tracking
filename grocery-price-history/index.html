<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HK Grocery Price History</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
<style>
  :root {
    --bg: #f7f8fa; --fg: #1a1d21; --muted: #6b7280;
    --card-bg: #ffffff; --border: #e4e7eb; --hover-bg: #f1f3f5;
    --accent: #0f766e; --accent-bg-soft: #ccfbf1;
    --shadow: 0 1px 2px rgba(0,0,0,.05);
    --green-bg: #dcfce7; --green-fg: #166534;
    --amber-bg: #fef3c7; --amber-fg: #92400e;
    --error-fg: #dc2626;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111418; --fg: #e5e7eb; --muted: #9ca3af;
      --card-bg: #1a1e24; --border: #2a2f37; --hover-bg: #20252c;
      --accent: #2dd4bf; --accent-bg-soft: rgba(45,212,191,.15);
      --shadow: 0 1px 2px rgba(0,0,0,.4);
      --green-bg: rgba(34,197,94,.18); --green-fg: #86efac;
      --amber-bg: rgba(245,158,11,.18); --amber-fg: #fcd34d;
      --error-fg: #f87171;
    }
  }
  * { box-sizing: border-box; }
  /* -apple-system-body is the iOS Safari Dynamic Type hook: it resolves to
     the user's OS text-size setting. Only font-family is overridden below,
     so size/line-height keep tracking Dynamic Type; every other font-size
     in this file is in rem so it scales off the same root value. */
  html { font: -apple-system-body; }
  body {
    font-family: system-ui, -apple-system, "PingFang HK", "Noto Sans TC", sans-serif;
    margin: 0; background: var(--bg); color: var(--fg);
  }
  .chip:focus-visible, .item:focus-visible, input:focus-visible, select:focus-visible {
    outline: 2px solid var(--accent); outline-offset: 2px;
  }

  .app-header {
    position: sticky; top: 0; z-index: 10;
    background: var(--bg); border-bottom: 1px solid var(--border);
    padding: .75rem 1rem;
  }
  .app-header h1 { font-size: 1.2rem; margin: 0 0 .15rem; padding-right: 3.5rem; }
  body.auth-on .app-header h1 { padding-right: 10rem; }
  .header-actions { position: absolute; top: .75rem; right: 1rem; display: flex; gap: .4rem; }
  .account-btn { max-width: 110px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .meta { color: var(--muted); font-size: .8rem; margin: 0 0 .6rem; }
  input[type=search] {
    width: 100%; max-width: 420px; padding: .5rem .75rem; font-size: .9rem;
    border: 1px solid var(--border); border-radius: 999px;
    background: var(--card-bg); color: var(--fg);
  }

  .filter-bar {
    display: flex; flex-wrap: wrap; align-items: center; gap: .5rem 1rem;
    padding: .5rem 1rem; border-bottom: 1px solid var(--border); background: var(--bg);
  }

  .layout { display: block; padding: 1rem; max-width: none; }

  .below-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem; }
  .below-grid > .card { min-width: 0; } /* grid items default to min-width:auto, which lets an unshrinkable descendant blow out the whole grid */
  @media (max-width: 880px) {
    .below-grid { grid-template-columns: 1fr; }
  }

  .card {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 12px; padding: .75rem; box-shadow: var(--shadow);
  }
  .card h2 {
    font-size: .72rem; text-transform: uppercase; letter-spacing: .04em;
    font-weight: 600; color: var(--muted); margin: 0 0 .5rem;
  }

  .products-head { display: flex; align-items: center; justify-content: space-between; gap: .5rem; flex-wrap: wrap; }
  .products-head h2 { margin: 0; flex-shrink: 0; }
  .sort-control { display: flex; align-items: center; gap: .4rem; margin-bottom: .5rem; min-width: 0; flex: 1 1 auto; justify-content: flex-end; }
  .sort-control label { font-size: .72rem; color: var(--muted); flex-shrink: 0; }
  .sort-control select {
    min-height: 2.75rem; flex: 0 1 auto; min-width: 0; max-width: 100%;
    border: 1px solid var(--border); background: var(--card-bg);
    color: var(--fg); border-radius: 999px; padding: .3rem .7rem; font-size: .8rem;
    font: inherit; cursor: pointer; text-overflow: ellipsis;
  }

  .chips { display: flex; flex-wrap: wrap; gap: .4rem; }
  .chip {
    display: inline-flex; align-items: center; min-height: 2.75rem;
    border: 1px solid var(--border); background: var(--card-bg); color: var(--fg);
    border-radius: 999px; padding: .3rem .9rem; font-size: .8rem; font: inherit; cursor: pointer;
    transition: background-color .15s ease, border-color .15s ease, transform .1s ease;
  }
  .chip[hidden] { display: none; }
  .chip:hover { background: var(--hover-bg); }
  .chip:active { transform: scale(.97); }
  .chip .count { color: var(--muted); margin-left: .25rem; font-size: .75rem; }
  .chip.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }
  .chip.active:hover { background: var(--accent); }
  .chip.active .count { color: inherit; opacity: .85; }

  .cat-picker { position: relative; display: inline-flex; align-items: center; gap: .4rem; }
  .cat-label { font-size: .75rem; color: var(--muted); }
  .cat-btn { display: inline-flex; align-items: center; gap: .35rem; }
  .cat-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }
  .cat-chevron { display: inline-block; font-size: .75em; transition: transform .15s ease; }
  .cat-btn[aria-expanded="true"] .cat-chevron { transform: rotate(180deg); }
  .cat-clear {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 2.75rem; min-height: 2.75rem; border: none; background: none;
    color: var(--muted); font-size: 1.1rem; line-height: 1; cursor: pointer;
    border-radius: 50%;
  }
  .cat-clear:hover { background: var(--hover-bg); color: var(--fg); }
  .cat-clear[hidden] { display: none; }
  .cat-menu {
    position: absolute; top: calc(100% + 6px); left: 0; z-index: 30;
    min-width: 300px; max-width: 380px; max-height: 360px; overflow-y: auto;
    background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0,0,0,.12); padding: .25rem;
  }
  .cat-menu[hidden] { display: none; }
  .cat-row {
    display: flex; justify-content: space-between; align-items: center; gap: .5rem;
    min-height: 2.75rem; padding: .45rem .6rem; border-radius: 8px; cursor: pointer; font-size: .85rem;
  }
  .cat-row:hover { background: var(--hover-bg); }
  .cat-row:active { background: var(--hover-bg); }
  .cat-row.cat-back { color: var(--muted); font-size: .8rem; }
  .cat-row .count { color: var(--muted); font-size: .78rem; }
  .cat-row-right { display: flex; align-items: center; gap: .4rem; }
  .cat-path-label {
    color: var(--muted); font-size: .75rem; padding: .1rem .6rem .4rem;
    border-bottom: 1px solid var(--border); margin-bottom: .25rem;
  }

  .store-dot {
    display: inline-block; width: 10px; height: 10px; border-radius: 50%;
    margin-right: .35rem; vertical-align: middle;
  }
  .store-tag { display:inline-flex; align-items:center; gap:.3rem; font-size:.7rem; color:var(--muted); white-space:nowrap; }
  .store-tag .store-dot { width:7px; height:7px; margin-right:0; }
  .stores-row { margin-top:.3rem; display:flex; gap:.6rem; flex-wrap:wrap; }

  .result-count { font-size: .75rem; color: var(--muted); margin: 0 0 .5rem; }

  .list { max-height: 420px; overflow-y: auto; display: flex; flex-direction: column; gap: .4rem; }
  .item {
    display: block; width: 100%; min-height: 2.75rem; text-align: left; padding: .6rem .7rem;
    border: 1px solid var(--border); border-radius: 10px; background: var(--card-bg);
    box-shadow: var(--shadow); cursor: pointer; font: inherit; color: var(--fg);
    transition: background-color .15s ease, border-color .15s ease, box-shadow .15s ease, transform .1s ease;
    flex-shrink: 0;
  }
  .item:hover { background: var(--hover-bg); border-color: var(--muted); box-shadow: 0 2px 8px rgba(0,0,0,.08); }
  .item:active { transform: scale(.99); }
  .item.selected { border-color: var(--accent); background: var(--accent-bg-soft); }
  .item-row { display: flex; justify-content: space-between; align-items: flex-start; gap: .5rem; }
  .item-name { font-weight: 500; font-size: .88rem; }
  .item-sub { color: var(--muted); font-size: .78rem; margin-top: 1px; }
  .item-price { font-size: .85rem; font-weight: 500; white-space: nowrap; text-align: right; }
  .item-unit { font-size: .72rem; font-weight: 400; color: var(--muted); margin-top: 1px; }
  .item-arrow { color: var(--muted); font-size: .8rem; align-self: center; }
  .badges { margin-top: .3rem; display: flex; gap: .25rem; flex-wrap: wrap; }

  .item-main { display: flex; align-items: center; gap: .5rem; min-width: 0; flex: 1 1 auto; }
  .thumb {
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    width: 40px; height: 40px; border-radius: 8px;
    background: var(--hover-bg); border: 1px solid var(--border); overflow: hidden;
  }
  .thumb img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .thumb.thumb-detail { width: 64px; height: 64px; border-radius: 10px; }

  .drop-item { display: flex; justify-content: space-between; align-items: center; gap: .5rem; }
  .drop-item small { color: var(--muted); }
  .drop-item-main { display: flex; align-items: center; gap: .5rem; min-width: 0; flex: 1 1 auto; }

  @media (prefers-reduced-motion: reduce) {
    .item, .chip, .cat-chevron, .detail-collapse, .detail-toggle .chevron { transition: none; }
  }

  .badge {
    display: inline-block; padding: 1px 8px; border-radius: 999px;
    font-size: .7rem; font-weight: 600; white-space: nowrap;
  }
  .badge.fake { background: var(--amber-bg); color: var(--amber-fg); }
  .badge.drop { background: var(--green-bg); color: var(--green-fg); }

  .detail-card { padding: 0; }
  .detail-toggle {
    display: flex; width: 100%; align-items: center; justify-content: space-between;
    min-height: 2.75rem; padding: .75rem; margin: 0; border: none; border-radius: 12px;
    background: none; color: var(--fg); font: inherit; font-weight: 600; cursor: pointer;
  }
  .detail-toggle:hover { background: var(--hover-bg); }
  .detail-toggle .chevron { color: var(--muted); transition: transform .15s ease; }
  .detail-toggle[aria-expanded="true"] .chevron { transform: rotate(180deg); }
  .detail-collapse {
    display: grid; grid-template-rows: 0fr; transition: grid-template-rows .25s ease;
  }
  .detail-collapse.open { grid-template-rows: 1fr; }
  .detail-collapse-inner { overflow: hidden; min-height: 0; }
  .detail-collapse-inner .detail { padding: 0 .75rem .75rem; }

  .detail { min-height: 480px; }
  .detail-head { display: flex; align-items: flex-start; gap: .6rem; }
  .detail h2 { margin: 0 0 .1rem; font-size: 1.1rem; }
  .detail .sub-line { color: var(--muted); font-size: .85rem; margin: 0 0 .75rem; }
  .detail-empty, .detail-loading, .detail-error {
    color: var(--muted); text-align: center; padding: 3rem 1rem;
  }
  .range-chips { margin: 0 0 .75rem; }
  .chart-wrap { height: 380px; position: relative; }

  table { width: 100%; border-collapse: collapse; font-size: .85rem; margin-top: .75rem; }
  th {
    text-align: left; color: var(--muted); font-weight: 600; font-size: .72rem;
    text-transform: uppercase; letter-spacing: .03em; padding: .4rem .5rem;
    border-bottom: 1px solid var(--border);
  }
  td { padding: .5rem; border-bottom: 1px solid var(--border); }
  tbody tr:hover td { background: var(--hover-bg); }
  th.num, td.num { text-align: right; font-variant-numeric: tabular-nums; }
  td.promo { max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .table-wrap { overflow-x: auto; }

  @media (max-width: 640px) {
    .layout { padding: .75rem; }
    input[type=search] { font-size: 1rem; } /* <16px input font triggers iOS zoom-on-focus; 1rem tracks Dynamic Type and is >=16px at default settings */
    .chip { padding: .45rem .8rem; }
    .cat-row { padding: .6rem; }
    .filter-bar .chips { flex-wrap: nowrap; overflow-x: auto; width: 100%; padding-bottom: .25rem; }
    .cat-menu { max-width: calc(100vw - 2rem); min-width: min(300px, calc(100vw - 2rem)); }
    .detail { min-height: auto; }
    .chart-wrap { height: 300px; }
  }

  .site-footer { text-align: center; padding: 1.5rem 1rem; font-size: .75rem; color: var(--muted); }
  .site-footer a { color: var(--muted); overflow-wrap: anywhere; }

  .star {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 2.75rem; min-height: 2.75rem; border-radius: 50%;
    cursor: pointer; margin-left: .2rem; color: var(--muted); user-select: none;
  }
  .star:hover { background: var(--hover-bg); }
  .star.tracked { color: var(--accent); }

  .modal-overlay {
    position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,.4);
    display: flex; align-items: center; justify-content: center; padding: 1rem;
  }
  .modal-overlay[hidden] { display: none; }
  .modal-card { width: 100%; max-width: 340px; }
  .modal-card h2 { margin: 0 0 .75rem; font-size: 1rem; }
  .modal-card input {
    display: block; width: 100%; margin-bottom: .5rem; padding: .5rem .75rem;
    font-size: 1rem; border: 1px solid var(--border); border-radius: 8px;
    background: var(--bg); color: var(--fg);
  }
  .modal-actions { display: flex; gap: .5rem; flex-wrap: wrap; margin-top: .5rem; }
  .auth-error { color: var(--error-fg); font-size: .8rem; margin-bottom: .5rem; }
  .auth-note { color: var(--accent); font-size: .8rem; margin-bottom: .5rem; }
  .oauth-buttons { display: flex; flex-direction: column; gap: .5rem; margin-bottom: .75rem; }
  .oauth-btn { width: 100%; justify-content: center; font-weight: 500; }
  .oauth-apple { background: #000; border-color: #000; color: #fff; }
  .oauth-apple:hover { background: #1a1a1a; }
  .auth-divider { display: flex; align-items: center; gap: .6rem; margin: 0 0 .75rem; color: var(--muted); font-size: .78rem; }
  .auth-divider::before, .auth-divider::after { content: ''; flex: 1; border-top: 1px solid var(--border); }
</style>
</head>
<body>
<header class="app-header">
  <div class="header-actions">
    <button type="button" class="chip account-btn" id="accountBtn" hidden></button>
    <button type="button" class="chip lang-toggle" id="langToggle">繁</button>
  </div>
  <h1 id="pageTitle">HK Grocery Price History</h1>
  <div class="meta" id="meta">Loading index.json ...</div>
  <input type="search" id="search" placeholder="Search product name or brand...">
</header>

<div class="filter-bar">
  <div class="chips" id="storeChips"></div>
  <div class="cat-picker">
    <span class="cat-label" id="catLabel">Category</span>
    <button type="button" class="chip cat-btn" id="catBtn" aria-haspopup="true" aria-expanded="false">
      <span id="catBtnText">All categories</span><span class="cat-chevron" aria-hidden="true">&#9662;</span>
    </button>
    <button type="button" class="cat-clear" id="catClear" hidden>&times;</button>
    <div class="cat-menu" id="catMenu" hidden></div>
  </div>
  <button type="button" class="chip" id="trackerChip" hidden></button>
</div>

<div class="layout">
  <div class="card detail-card" id="detailCard">
    <button type="button" class="detail-toggle" id="detailToggle" aria-expanded="false" aria-controls="detailCollapse">
      <span id="detailToggleLabel">Price chart</span><span class="chevron" aria-hidden="true">&#9662;</span>
    </button>
    <div class="detail-collapse" id="detailCollapse">
      <div class="detail-collapse-inner">
        <div class="detail" id="detail">
          <div class="detail-empty">Select a product to see its price history.</div>
        </div>
      </div>
    </div>
  </div>
  <div class="below-grid">
    <div class="card">
      <div class="products-head">
        <h2 id="productsHeading">Products</h2>
        <div class="sort-control">
          <label for="sortSelect" id="sortLabel">Sort</label>
          <select id="sortSelect"></select>
        </div>
      </div>
      <div class="result-count" id="resultCount"></div>
      <div class="list" id="results"></div>
    </div>
    <div class="card">
      <h2 id="dropsHeading">Biggest drops (window-low, &ge;10% below 90-day median)</h2>
      <div class="list drops-list" id="drops"></div>
    </div>
  </div>
</div>

<footer class="site-footer" id="siteFooter"></footer>

<div class="modal-overlay" id="authModal" hidden></div>

<script>
// ponytail: no build step, no framework — fetch + render, good enough for a prototype.
// index.json holds search/badge/drop summaries (badges + drops precomputed
// server-side by backfill.py, since the sparse per-store series needed for
// that math isn't cheap to fetch for every product in a search list).
// p.category is a list of 1-3 names (Category 1/2/3 from the source CSV);
// Category 1 itself may contain " / " so it's never split, only stored as-is.
// products/<code>.json holds one product's sparse series, fetched on click.
// Accounts + watchlist (Supabase). Leave both blank to keep the site exactly
// as it was before this feature — see SETUP-AUTH.md to fill them in.
const SUPABASE_URL = 'https://cwchbjmtvfwmdyakndvx.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_hIDB5IxyTM_7uz1eoJpDXA_xHv8Xox6';
const AUTH_ENABLED = !!(SUPABASE_URL && SUPABASE_ANON_KEY);
if (AUTH_ENABLED) document.body.classList.add('auth-on');
let sb = null;
let session = null;
let watchlist = new Set();
if (AUTH_ENABLED) {
  const sbScript = document.createElement('script');
  sbScript.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
  sbScript.onload = () => {
    sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    initAuth();
  };
  document.head.appendChild(sbScript);
}

// Product photos: flat code -> OPW photoRedirect path map, built by another
// pipeline. Feature-flag style — site works identically if this 404s or is
// absent (empty map, no thumbnails rendered).
let IMAGES = {};
fetch('./images.json').then(r => r.ok ? r.json() : {}).then(d => {
  IMAGES = d || {};
  if (INDEX) renderAll();
}).catch(() => {});

function thumbHTML(code, extraClass) {
  const path = IMAGES[code];
  const img = path
    ? `<img src="https://online-price-watch.consumer.org.hk${path}" loading="lazy" referrerpolicy="no-referrer" onerror="this.remove()">`
    : '';
  return `<span class="thumb${extraClass ? ' ' + extraClass : ''}">${img}</span>`;
}

let INDEX = null;
let PRODUCT_BY_CODE = new Map();
let selectedCode = null;
let selectedSummary = null;
const state = {
  cat1: null, cat2: null, cat3: null, stores: new Set(), query: '',
  lang: localStorage.getItem('opwLang') || 'en',
  trackerOnly: false, sort: 'stores_desc', chartOpen: false,
};
let menuPath = [];
let catMenuOpen = false;

// TC name/brand/category per product code, fetched once on first switch to
// TC (module-level cache, null until loaded). Built by backfill.py
// --build-names-tc from sampled archive snapshots.
let NAMES_TC = null;
const tcOf = code => (NAMES_TC ? NAMES_TC[code] || null : null);
const nameOf = p => (state.lang === 'tc' && tcOf(p.code)?.name) || p.name;
const brandOf = p => (state.lang === 'tc' && tcOf(p.code)?.brand) || p.brand;
const catOf = p => (state.lang === 'tc' && tcOf(p.code)?.cat?.length ? tcOf(p.code).cat : p.category);

// ponytail: category VALUES differ by language, so switching language
// resets the active category filter rather than trying to translate it.
const T = {
  en: {
    h1: 'HK Grocery Price History',
    searchPlaceholder: 'Search product name or brand...',
    allCategories: 'All categories',
    allIn: x => `All in ${x}`,
    back: '‹ Back',
    products: 'Products',
    showing: (shown, total) => `Showing ${shown} of ${total} products`,
    dropsTitle: 'Biggest drops (window-low, ≥10% below 90-day median)',
    noneMatch: 'None match current filters.',
    selectProduct: 'Select a product to see its price history.',
    loading: 'Loading price history...',
    loadFailed: err => `Failed to load price history: ${err}`,
    thChain: 'Chain', thLatest: 'Latest', thMedian: 'Series median', thOffer: 'Offer',
    badgeFake: 'fake discount', badgeDrop: 'drop',
    fakeLabel: store => `fake discount: ${store}`,
    dropLabel: store => `drop: ${store}`,
    sourcePrefix: 'Source: ',
    meta: (n, m, start, end) => `${n} products, ${m} snapshots (${start} to ${end})`,
    rangeLabels: { '3M': '3M', '1Y': '1Y', '3Y': '3Y', All: 'All' },
    account: 'Account', login: 'Log in', signUp: 'Sign up', logout: 'Log out',
    email: 'Email', password: 'Password', cancel: 'Cancel',
    myTracker: 'My tracker', track: 'Track', untrack: 'Untrack',
    noTracked: 'No tracked products yet',
    confirmSent: 'Confirmation email sent',
    category: 'Category', clearCategory: 'Clear category',
    chartHeading: 'Price chart',
    sortLabel: 'Sort', sortStores: 'Most supermarkets',
    sortPrice: 'Lowest price', sortUnit: 'Price per unit',
    continueGoogle: 'Continue with Google', continueApple: 'Continue with Apple', or: 'or',
  },
  tc: {
    h1: '香港超市價格紀錄',
    searchPlaceholder: '搜尋貨品名稱或品牌⋯',
    allCategories: '所有分類',
    allIn: x => `${x}（全部）`,
    back: '‹ 返回',
    products: '貨品',
    showing: (shown, total) => `顯示 ${total} 件貨品中的 ${shown} 件`,
    dropsTitle: '最大跌幅（視窗新低，低於90日中位數≥10%）',
    noneMatch: '沒有符合篩選的貨品。',
    selectProduct: '請選擇貨品以查看價格紀錄。',
    loading: '載入價格紀錄中⋯',
    loadFailed: err => `載入失敗：${err}`,

  document.querySelectorAll(`.star[data-code="${CSS.escape(code)}"]`).forEach(s => {

async function toggleTrack(code) {
  if (!session) { openAuthModal('login'); return; }
  const wasTracked = watchlist.has(code);
  if (wasTracked) watchlist.delete(code); else watchlist.add(code);
  syncStars(code);
  try {
    const { error } = wasTracked
      ? await sb.from('watchlist').delete().eq('user_id', session.user.id).eq('product_code', code)
      : await sb.from('watchlist').insert({ user_id: session.user.id, product_code: code });
    if (error) throw error;
  } catch {
    if (wasTracked) watchlist.add(code); else watchlist.delete(code);
    syncStars(code);
  }
  if (state.trackerOnly) applyFilters();
}

// Counts distinct category[depth] values among products whose category[0..depth-1]
// matches parentVals — feeds each dependent select with only its valid children.
function catCounts(depth, parentVals) {
  const counts = new Map();
  for (const p of INDEX.products) {
    const cat = catOf(p);
    if (parentVals.some((v, i) => cat[i] !== v)) continue;
    const val = cat[depth];
    if (val) counts.set(val, (counts.get(val) || 0) + 1);
  }
  return counts;
}

// Checks whether product p's category path matches the currently selected
// cat1/cat2/cat3 filters (any unset level matches everything at that level).
// Category values are language-specific (see catOf) — switching language
// resets these filters rather than translating them.
function matchesCat(p) {
  if (!p) return false;
  const cat = catOf(p);
  if (state.cat1 && cat[0] !== state.cat1) return false;
  if (state.cat2 && cat[1] !== state.cat2) return false;
  if (state.cat3 && cat[2] !== state.cat3) return false;
  return true;
}

// Search always matches EN + TC name/brand, regardless of active language.
// Shared by the products list and the drops panel.
function matchesSearch(p) {
  if (!p) return false;
  const q = state.query;
  if (p.name.toLowerCase().includes(q) || p.brand.toLowerCase().includes(q)) return true;
  const tc = tcOf(p.code);
  return !!tc && ((tc.name || '').toLowerCase().includes(q) || (tc.brand || '').toLowerCase().includes(q));
}

  el.tabIndex = 0;

function renderCatMenu() {
  const menu = document.getElementById('catMenu');
  menu.innerHTML = '';
  const depth = menuPath.length;

  if (depth > 0) {
    const back = document.createElement('div');
    back.className = 'cat-row cat-back';
    back.textContent = t().back;
    setRowActivation(back, () => { menuPath.pop(); renderCatMenu(); });
    menu.appendChild(back);

    const label = document.createElement('div');
    label.className = 'cat-path-label';
    label.textContent = menuPath.join(' › ');
    menu.appendChild(label);
  }

  const allRow = document.createElement('div');
  allRow.className = 'cat-row';
  allRow.textContent = depth === 0 ? t().allCategories : t().allIn(menuPath[menuPath.length - 1]);
  setRowActivation(allRow, () => applyCatPath(menuPath));
  menu.appendChild(allRow);

  const sorted = [...catCounts(depth, menuPath).entries()].sort((a, b) => b[1] - a[1]);
  for (const [name, count] of sorted) {
    const row = document.createElement('div');
    row.className = 'cat-row';
    const nameSpan = document.createElement('span');
    nameSpan.textContent = name;
    const right = document.createElement('span');
    right.className = 'cat-row-right';
    const countSpan = document.createElement('span');
    countSpan.className = 'count';
    countSpan.textContent = count;
    right.appendChild(countSpan);

    const hasChildren = catCounts(depth + 1, [...menuPath, name]).size > 0;
    if (hasChildren) {
      const arrow = document.createElement('span');
      arrow.textContent = '›';
      right.appendChild(arrow);
      setRowActivation(row, () => { menuPath.push(name); renderCatMenu(); });
    } else {
      setRowActivation(row, () => applyCatPath([...menuPath, name]));
    }
    row.appendChild(nameSpan);
    row.appendChild(right);
    menu.appendChild(row);
  }
}

// ponytail: back-of-envelope unit-price parser, one regex pass over the
// product name. Handles "330mL", "1.5L", "500g", "1kg", "565 GM",
// "250mL x 6", and count-only sizes ("6's"/"6pcs"/"6包"/"6片"). Known
// ceiling: no ranges ("2-3pcs"), no fractions, no units beyond ml/L/g/kg/
// piece — those fall through to null (sorts last). Upgrade to a real units
// library if the product catalog grows beyond HK grocery/drugstore SKUs.
function parseUnitPrice(name, price) {
  const m = name.match(/(?:(\d+)\s*x\s*)?(\d+(?:\.\d+)?)\s*(mL|ml|ML|L|l|kg|KG|Kg|g|G|GM|gm)\b(?:\s*x\s*(\d+))?/);
  if (m) {
    const [, preMult, size, unitRaw, postMult] = m;
    const n = parseFloat(size) * (parseFloat(preMult || postMult) || 1);
    if (!n) return null;
    const unit = unitRaw.toLowerCase();
    if (unit === 'l') return { value: price / (n * 10), unit: '100ml' };
    if (unit === 'ml') return { value: price / (n / 100), unit: '100ml' };
    if (unit === 'kg') return { value: price / (n * 10), unit: '100g' };
    return { value: price / (n / 100), unit: '100g' };
  }
  const cm = name.match(/(\d+)\s*(?:pcs?|'s|包|片)/i);
  if (cm) {
    const n = parseFloat(cm[1]);
    return n ? { value: price / n, unit: 'piece' } : null;
  }
  return null;
}

function unitPriceOf(p) {
  const price = p.latest_price_range?.[0];
  return price == null ? null : parseUnitPrice(nameOf(p), price);
}

function sortProducts(list) {
  if (state.sort === 'price_asc') {
    return [...list].sort((a, b) => (a.latest_price_range?.[0] ?? Infinity) - (b.latest_price_range?.[0] ?? Infinity));
  }
  if (state.sort === 'unit_asc') {
    // Group by unit basis first (volume, then weight, then piece, then
    // unparseable last) — comparing raw $/100ml vs $/100g vs $/piece numbers
    // is meaningless since they're different quantities.
    const unitOrder = { '100ml': 0, '100g': 1, piece: 2 };
    return [...list].sort((a, b) => {
      const ua = unitPriceOf(a), ub = unitPriceOf(b);
      const oa = ua ? unitOrder[ua.unit] : 3;
      const ob = ub ? unitOrder[ub.unit] : 3;
      if (oa !== ob) return oa - ob;
      return oa === 3 ? 0 : ua.value - ub.value;
    });
  }
  return [...list].sort((a, b) => b.stores.length - a.stores.length); // stores_desc (default)
}

  let list = INDEX.products.filter(matchesCat);
  if (state.stores.size) {
    list = list.filter(p => p.stores.some(s => state.stores.has(s)));
  }
  if (state.trackerOnly) {
    list = list.filter(p => watchlist.has(p.code));
  }
  if (state.query) list = list.filter(matchesSearch);
  list = sortProducts(list);
  const shown = Math.min(list.length, 200);
  document.getElementById('resultCount').textContent = t().showing(shown, list.length);
  renderResults(list.slice(0, 200));
  if (state.trackerOnly && !list.length) {
    document.getElementById('results').innerHTML = `<div class="item-sub">${t().noTracked}</div>`;
  }
}

function renderResults(products) {
  const el = document.getElementById('results');
  el.innerHTML = '';
  for (const p of products) {
    const up = state.sort === 'unit_asc' ? unitPriceOf(p) : null;
    const unitLine = state.sort === 'unit_asc'
      ? `<div class="item-unit">${up ? `$${up.value.toFixed(1)}/${up.unit}` : ''}</div>` : '';
    // Row is a div (not <button>) because it contains a nested star toggle —
    // a <button> cannot contain other interactive/tabindex descendants.
    const btn = document.createElement('div');
    btn.setAttribute('role', 'button');
    btn.tabIndex = 0;
    btn.className = 'item' + (p.code === selectedCode ? ' selected' : '');
    btn.innerHTML =
      `<div class="item-row"><div class="item-main">${thumbHTML(p.code)}<div><div class="item-name">${nameOf(p)}</div>` +
      `<div class="item-sub">${brandOf(p)} &middot; ${catLabel(catOf(p))}</div></div></div>` +
      `<div class="item-price">${priceLabel(p.latest_price_range)}${starHTML(p.code)}${unitLine}</div>` +
      `<span class="item-arrow" aria-hidden="true">&rsaquo;</span></div>` +
      `<div class="stores-row">${STORE_ORDER.filter(s => p.stores.includes(s)).map(storeTag).join('')}</div>` +
      `<div class="badges">${badgeSpans(p.badges)}</div>`;
    btn.onclick = () => selectProduct(p, btn);
    btn.onkeydown = e => {
      if (e.target !== btn) return; // let the nested star handle its own Enter/Space
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); selectProduct(p, btn); }
    };
    el.appendChild(btn);
  }
}

function selectProduct(p, btnEl) {
  selectedCode = p.code;
  selectedSummary = p;
  document.querySelectorAll('.item.selected').forEach(x => x.classList.remove('selected'));
  if (btnEl) btnEl.classList.add('selected');
  setDetailOpen(true);
  renderDetailToggleLabel();
  renderDetail(p);
  if (window.innerWidth < 880) {
    document.getElementById('detailCard').scrollIntoView({ behavior: 'smooth' });
  }
}

// Formats a set of per-store values as "-X" when all stores agree, or
// "-min ~ -max" when they differ (values are always positive drop magnitudes).
function dropRangeLabel(vals, fmt) {
  const min = Math.min(...vals), max = Math.max(...vals);
  return min === max ? fmt(min) : `${fmt(min)} ~ ${fmt(max)}`;
}

function renderDrops() {
  const el = document.getElementById('drops');
  el.innerHTML = '';
  const entries = INDEX.drops.filter(d => {
    const p = PRODUCT_BY_CODE.get(d.code);
    if (!matchesCat(p)) return false;
    if (state.stores.size && !state.stores.has(d.store)) return false;
    if (state.query && !matchesSearch(p)) return false;
    return true;
  });
  // Same product code can drop in multiple chains — group into one row per
  // product, keeping every store's entry so pct/$ can be shown as ranges.
  const groups = new Map();
  for (const d of entries) {
    if (!groups.has(d.code)) groups.set(d.code, { code: d.code, name: d.name, entries: [] });
    groups.get(d.code).entries.push(d);
  }
  const rows = [...groups.values()].sort((a, b) =>
    Math.max(...b.entries.map(d => d.pct)) - Math.max(...a.entries.map(d => d.pct))
  );
  for (const row of rows.slice(0, 20)) {
    const stores = STORE_ORDER.filter(s => row.entries.some(d => d.store === s));
    const pctLabel = dropRangeLabel(row.entries.map(d => d.pct), v => `-${v.toFixed(0)}%`);
    const decLabel = dropRangeLabel(row.entries.map(d => d.median - d.latest), v => `-$${v.toFixed(2)}`);
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'item drop-item';
    btn.innerHTML = `<span class="drop-item-main">${thumbHTML(row.code)}<span>${nameOf(row)} ${stores.map(storeTag).join('')}</span></span>` +
      `<span class="badge drop">${pctLabel} ${decLabel}</span>`;
    btn.onclick = () => {
      const p = INDEX.products.find(x => x.code === row.code);
      if (p) selectProduct(p, null);
    };
    el.appendChild(btn);
  }
  if (!rows.length) el.innerHTML = `<div class="item-sub">${t().noneMatch}</div>`;
}

function median(nums) {
  const s = [...nums].sort((a, b) => a - b);
  const mid = Math.floor(s.length / 2);
  return s.length % 2 ? s[mid] : (s[mid - 1] + s[mid]) / 2;
}

let chart = null;

async function renderDetail(summary) {
  const el = document.getElementById('detail');
  el.innerHTML = `<div class="detail-head">${thumbHTML(summary.code, 'thumb-detail')}<div><h2>${nameOf(summary)}</h2>` +
    `<p class="sub-line">${brandOf(summary)} &middot; ${catLabel(catOf(summary))}</p></div></div>` +
    `<div class="detail-loading">${t().loading}</div>`;

  let p;
  try {
    p = await fetch(`./products/${summary.code}.json`).then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.json();
    });
  } catch (err) {
    el.innerHTML += `<div class="detail-error">${t().loadFailed(err)}</div>`;
    return;
  }

  el.innerHTML = `<div class="detail-head">${thumbHTML(p.code, 'thumb-detail')}<div><h2>${nameOf(p)}${starHTML(p.code)}</h2>` +
    `<p class="sub-line">${brandOf(p)} &middot; ${catLabel(catOf(p))}</p></div></div>` +
    `<div class="chips range-chips" id="rangeChips"></div>` +
    `<div class="chart-wrap"><canvas id="chart"></canvas></div><div class="table-wrap"><table id="latestTable"></table></div>`;

  // Series are sparse (a point only when price/promo changed). Extend each
  // store's line to the product's last confirmed-seen date with a flat
  // point, so the stepped chart doesn't visually stop at the last change
  // when the price has simply stayed the same since.
  const seriesEntries = Object.entries(p.series)
    .filter(([sm]) => !state.stores.size || state.stores.has(sm));
  const datasets = seriesEntries.map(([sm, series]) => {
    const points = series.map(pt => ({ x: Date.parse(pt[0]), y: pt[1], offer: pt[2] }));
    const last = series[series.length - 1];
    if (summary.last_seen && last[0] < summary.last_seen) {
      points.push({ x: Date.parse(summary.last_seen), y: last[1], offer: last[2] });
    }
    return {
      label: storeLabel(sm), data: points, stepped: true,
      borderColor: storeColor(sm), fill: false,
      borderWidth: 2, pointRadius: 0, pointHoverRadius: 4, pointHitRadius: 12,
      pointHoverBackgroundColor: storeColor(sm),
    };
  });

  function rangeWindow() {
    const days = RANGES[chartRange];
    if (days == null) return { min: undefined, max: undefined };
    const lastX = Math.max(...datasets.flatMap(d => d.data.map(pt => pt.x)));
    return { min: lastX - days * 864e5, max: lastX };
  }

  function renderRangeChips() {
    const el = document.getElementById('rangeChips');
    el.innerHTML = '';
    for (const key of Object.keys(RANGES)) {
      const chip = makeChip(t().rangeLabels[key], null, key === chartRange);
      chip.onclick = () => {
        chartRange = key;
        const { min, max } = rangeWindow();
        chart.options.scales.x.min = min;
        chart.options.scales.x.max = max;
        chart.update();
        renderRangeChips();
      };
      el.appendChild(chip);
    }
  }
  renderRangeChips();

  if (chart) chart.destroy();
  const initWindow = rangeWindow();
  chart = new Chart(document.getElementById('chart'), {
    type: 'line',
    data: { datasets },
    plugins: [crosshair],
    options: {
      parsing: false,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      scales: {
        x: {
          type: 'time', time: { tooltipFormat: 'yyyy-MM-dd' },
          min: initWindow.min, max: initWindow.max,
          grid: { display: false }, border: { display: false },
          ticks: { color: cssVar('--muted'), maxRotation: 0, maxTicksLimit: 6 },
        },
        y: {
          beginAtZero: false,
          grid: { color: cssVar('--border') }, border: { display: false },
          ticks: { color: cssVar('--muted'), maxTicksLimit: 5, callback: v => '$' + v },
        },
      },
      plugins: {
        legend: {
          position: 'bottom',
          labels: { usePointStyle: true, pointStyle: 'line', color: cssVar('--fg'), padding: 16 },
        },
        tooltip: {
          backgroundColor: cssVar('--card-bg'), borderColor: cssVar('--border'), borderWidth: 1,
          titleColor: cssVar('--fg'), bodyColor: cssVar('--fg'), padding: 10, cornerRadius: 8,
          usePointStyle: true, boxPadding: 4,
          callbacks: {
            // ponytail: historical Offers/promo text is EN-only source data
            // (see backfill.py) — shown untranslated in TC mode too.
            label: ctx => `${ctx.dataset.label}: $${ctx.parsed.y.toFixed(2)}` +
              (ctx.raw.offer ? ` — ${ctx.raw.offer}` : ''),
          },
        },
      },
    },
  });

  const fake = new Set(summary.badges.filter(b => b.startsWith('fake:')).map(b => b.split(':')[1]));
  const rows = seriesEntries.map(([sm, series]) => {
    const latest = series[series.length - 1];
    const med = median(series.map(pt => pt[1]));
    const badge = fake.has(sm) ? `<span class="badge fake">${t().badgeFake}</span>` : '';
    const offer = escapeHtml(latest[2] || '');
    return `<tr><td>${storeLabel(sm)}</td><td class="num">$${latest[1].toFixed(2)}</td><td class="num">$${med.toFixed(2)}</td>` +
      `<td class="promo" title="${offer}">${offer}</td><td>${badge}</td></tr>`;
  }).join('');
  document.getElementById('latestTable').innerHTML =
    `<tr><th>${t().thChain}</th><th class="num">${t().thLatest}</th><th class="num">${t().thMedian}</th><th>${t().thOffer}</th><th></th></tr>` + rows;
}
</script>
