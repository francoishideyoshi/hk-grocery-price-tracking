<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>HK Grocery Price History</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
<style>
  :root {
    --bg: #f7f8fa; --fg: #1a1d21; --muted: #6b7280;
    --card-bg: #ffffff; --border: #e4e7eb; --hover-bg: #f1f3f5;
    --accent: #0f766e; --accent-bg-soft: #ccfbf1;
    --shadow: 0 1px 2px rgba(0,0,0,.05);
    --green-bg: #dcfce7; --green-fg: #166534;
    --amber-bg: #fef3c7; --amber-fg: #92400e;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111418; --fg: #e5e7eb; --muted: #9ca3af;
      --card-bg: #1a1e24; --border: #2a2f37; --hover-bg: #20252c;
      --accent: #2dd4bf; --accent-bg-soft: rgba(45,212,191,.15);
      --shadow: 0 1px 2px rgba(0,0,0,.4);
      --green-bg: rgba(34,197,94,.18); --green-fg: #86efac;
      --amber-bg: rgba(245,158,11,.18); --amber-fg: #fcd34d;
    }
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    margin: 0; background: var(--bg); color: var(--fg);
  }
  .chip:focus-visible, .item:focus-visible, input:focus-visible, select:focus-visible {
    outline: 2px solid var(--accent); outline-offset: 2px;
  }

  .app-header {
    position: sticky; top: 0; z-index: 10;
    background: var(--bg); border-bottom: 1px solid var(--border);
    padding: .75rem 1rem;
  }
  .app-header h1 { font-size: 1.2rem; margin: 0 0 .15rem; }
  .meta { color: var(--muted); font-size: .8rem; margin: 0 0 .6rem; }
  input[type=search] {
    width: 100%; max-width: 420px; padding: .5rem .75rem; font-size: .9rem;
    border: 1px solid var(--border); border-radius: 999px;
    background: var(--card-bg); color: var(--fg);
  }

  .filter-bar {
    display: flex; flex-wrap: wrap; align-items: center; gap: .5rem 1rem;
    padding: .5rem 1rem; border-bottom: 1px solid var(--border); background: var(--bg);
  }

  .layout { display: block; padding: 1rem; max-width: none; }

  .below-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem; }
  @media (max-width: 880px) {
    .below-grid { grid-template-columns: 1fr; }
  }

  .card {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 12px; padding: .75rem; box-shadow: var(--shadow);
  }
  .card h2 {
    font-size: .72rem; text-transform: uppercase; letter-spacing: .04em;
    font-weight: 600; color: var(--muted); margin: 0 0 .5rem;
  }

  .chips { display: flex; flex-wrap: wrap; gap: .4rem; }
  .chip {
    border: 1px solid var(--border); background: var(--card-bg); color: var(--fg);
    border-radius: 999px; padding: .3rem .7rem; font-size: .8rem; cursor: pointer;
  }
  .chip .count { color: var(--muted); margin-left: .25rem; font-size: .75rem; }
  .chip.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }
  .chip.active .count { color: inherit; opacity: .85; }

  .cat-picker { position: relative; }
  .cat-btn { display: inline-flex; align-items: center; gap: .3rem; }
  .cat-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }
  .cat-menu {
    position: absolute; top: calc(100% + 6px); left: 0; z-index: 30;
    min-width: 300px; max-width: 380px; max-height: 360px; overflow-y: auto;
    background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0,0,0,.12); padding: .25rem;
  }
  .cat-menu[hidden] { display: none; }
  .cat-row {
    display: flex; justify-content: space-between; align-items: center; gap: .5rem;
    padding: .45rem .6rem; border-radius: 8px; cursor: pointer; font-size: .85rem;
  }
  .cat-row:hover { background: var(--hover-bg); }
  .cat-row.cat-back { color: var(--muted); font-size: .8rem; }
  .cat-row .count { color: var(--muted); font-size: .78rem; }
  .cat-row-right { display: flex; align-items: center; gap: .4rem; }
  .cat-path-label {
    color: var(--muted); font-size: .75rem; padding: .1rem .6rem .4rem;
    border-bottom: 1px solid var(--border); margin-bottom: .25rem;
  }

  .store-dot {
    display: inline-block; width: 10px; height: 10px; border-radius: 50%;
    margin-right: .35rem; vertical-align: middle;
  }

  .result-count { font-size: .75rem; color: var(--muted); margin: 0 0 .5rem; }

  .list { max-height: 420px; overflow-y: auto; display: flex; flex-direction: column; gap: 2px; }
  .item {
    display: block; width: 100%; text-align: left; padding: .5rem .6rem;
    border: 1px solid transparent; border-radius: 8px; background: none;
    cursor: pointer; font: inherit; color: var(--fg);
  }
  .item:hover { background: var(--hover-bg); }
  .item.selected { border-color: var(--accent); background: var(--accent-bg-soft); }
  .item-row { display: flex; justify-content: space-between; align-items: flex-start; gap: .5rem; }
  .item-name { font-weight: 500; font-size: .88rem; }
  .item-sub { color: var(--muted); font-size: .78rem; margin-top: 1px; }
  .item-price { font-size: .85rem; font-weight: 500; white-space: nowrap; }
  .badges { margin-top: .3rem; display: flex; gap: .25rem; flex-wrap: wrap; }

  .drop-item { display: flex; justify-content: space-between; align-items: center; gap: .5rem; }
  .drop-item small { color: var(--muted); }

  .badge {
    display: inline-block; padding: 1px 8px; border-radius: 999px;
    font-size: .7rem; font-weight: 600; white-space: nowrap;
  }
  .badge.fake { background: var(--amber-bg); color: var(--amber-fg); }
  .badge.drop { background: var(--green-bg); color: var(--green-fg); }

  .detail { min-height: 480px; }
  .detail h2 { margin: 0 0 .1rem; font-size: 1.1rem; }
  .detail .sub-line { color: var(--muted); font-size: .85rem; margin: 0 0 .75rem; }
  .detail-empty, .detail-loading, .detail-error {
    color: var(--muted); text-align: center; padding: 3rem 1rem;
  }
  .range-chips { margin: 0 0 .75rem; }
  .chart-wrap { height: 380px; position: relative; }

  table { width: 100%; border-collapse: collapse; font-size: .85rem; margin-top: .75rem; }
  th {
    text-align: left; color: var(--muted); font-weight: 600; font-size: .72rem;
    text-transform: uppercase; letter-spacing: .03em; padding: .4rem .5rem;
    border-bottom: 1px solid var(--border);
  }
  td { padding: .5rem; border-bottom: 1px solid var(--border); }
  tbody tr:hover td { background: var(--hover-bg); }
  th.num, td.num { text-align: right; font-variant-numeric: tabular-nums; }
  td.promo { max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .site-footer { text-align: center; padding: 1.5rem 1rem; font-size: .75rem; color: var(--muted); }
  .site-footer a { color: var(--muted); }
</style>
</head>
<body>
<header class="app-header">
  <h1>HK Grocery Price History</h1>
  <div class="meta" id="meta">Loading index.json ...</div>
  <input type="search" id="search" placeholder="Search product name or brand...">
</header>

<div class="filter-bar">
  <div class="chips" id="storeChips"></div>
  <div class="cat-picker">
    <button type="button" class="chip cat-btn" id="catBtn">All categories &#9662;</button>
    <div class="cat-menu" id="catMenu" hidden></div>
  </div>
</div>

<div class="layout">
  <div class="card detail" id="detail">
    <div class="detail-empty">Select a product to see its price history.</div>
  </div>
  <div class="below-grid">
    <div class="card">
      <h2>Products</h2>
      <div class="result-count" id="resultCount"></div>
      <div class="list" id="results"></div>
    </div>
    <div class="card">
      <h2>Biggest drops (window-low, &ge;10% below 90-day median)</h2>
      <div class="list drops-list" id="drops"></div>
    </div>
  </div>
</div>

<footer class="site-footer" id="siteFooter"></footer>

<script>
// ponytail: no build step, no framework — fetch + render, good enough for a prototype.
// index.json holds search/badge/drop summaries (badges + drops precomputed
// server-side by backfill.py, since the sparse per-store series needed for
// that math isn't cheap to fetch for every product in a search list).
// p.category is a list of 1-3 names (Category 1/2/3 from the source CSV);
// Category 1 itself may contain " / " so it's never split, only stored as-is.
// products/<code>.json holds one product's sparse series, fetched on click.
let INDEX = null;
let PRODUCT_BY_CODE = new Map();
let selectedCode = null;
let selectedSummary = null;
const state = { cat1: null, cat2: null, cat3: null, stores: new Set(), query: '' };
let menuPath = [];
let catMenuOpen = false;

// Permanent per-chain colors — placeholders until user assigns final ones. Keys = OPW Supermarket Codes.
const STORE_COLORS = {
  PARKNSHOP: '#1976d2', WELLCOME: '#d32f2f', AEON: '#7b1fa2',
  WATSONS: '#00897b', MANNINGS: '#f57c00', JASONS: '#388e3c',
  DCHFOOD: '#6d4c41', LUNGFUNG: '#c2185b', SASA: '#9e9d24',
};
const STORE_ORDER = Object.keys(STORE_COLORS);
const storeColor = sm => STORE_COLORS[sm] || '#9e9e9e';
const catLabel = c => Array.isArray(c) ? c.join(' › ') : c;

const RANGES = { '3M': 90, '1Y': 365, '3Y': 1095, 'All': null };
let chartRange = '1Y';
const cssVar = n => getComputedStyle(document.documentElement).getPropertyValue(n).trim();

const crosshair = {
  id: 'crosshair',
  afterDraw(c) {
    const active = c.tooltip?.getActiveElements?.();
    if (!active?.length) return;
    const { ctx, chartArea } = c;
    const x = active[0].element.x;
    ctx.save();
    ctx.strokeStyle = cssVar('--border');
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x, chartArea.top);
    ctx.lineTo(x, chartArea.bottom);
    ctx.stroke();
    ctx.restore();
  },
};

matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
  if (selectedSummary) renderDetail(selectedSummary);
});

fetch('./index.json').then(r => r.json()).then(d => {
  INDEX = d;
  PRODUCT_BY_CODE = new Map(d.products.map(p => [p.code, p]));
  document.getElementById('meta').textContent =
    `${d.products.length} products, ${d.meta.snapshot_count} snapshots ` +
    `(${d.meta.window_start} to ${d.meta.window_end})`;
  document.getElementById('siteFooter').innerHTML =
    `Source: <a href="${d.meta.source}" target="_blank" rel="noopener">${d.meta.source}</a>`;
  renderStoreChips();
  renderCatBtn();
  applyFilters();
  renderDrops();
}).catch(err => {
  document.getElementById('meta').textContent = 'Failed to load index.json: ' + err;
});

function badgeSpans(badges) {
  return badges.map(b => {
    const [kind, store] = b.split(':');
    return kind === 'fake'
      ? `<span class="badge fake">fake discount: ${store}</span>`
      : `<span class="badge drop">drop: ${store}</span>`;
  }).join('');
}

function priceLabel(range) {
  if (!range) return '';
  const [lo, hi] = range;
  return lo === hi ? `$${lo.toFixed(2)}` : `$${lo.toFixed(2)}–$${hi.toFixed(2)}`;
}

function makeChip(html, count, active) {
  const b = document.createElement('button');
  b.type = 'button';
  b.className = 'chip' + (active ? ' active' : '');
  b.innerHTML = count == null ? html : `${html} <span class="count">${count}</span>`;
  return b;
}

function renderStoreChips() {
  const el = document.getElementById('storeChips');
  el.innerHTML = '';
  for (const sm of STORE_ORDER) {
    const chip = makeChip(
      `<span class="store-dot" style="background:${storeColor(sm)}"></span>${sm}`,
      null, state.stores.has(sm)
    );
    chip.onclick = () => toggleStore(sm);
    el.appendChild(chip);
  }
}

function toggleStore(sm) {
  if (state.stores.has(sm)) state.stores.delete(sm); else state.stores.add(sm);
  renderStoreChips();
  applyFilters();
  renderDrops();
  if (selectedSummary) renderDetail(selectedSummary);
}

// Counts distinct category[depth] values among products whose category[0..depth-1]
// matches parentVals — feeds each dependent select with only its valid children.
function catCounts(depth, parentVals) {
  const counts = new Map();
  for (const p of INDEX.products) {
    if (parentVals.some((v, i) => p.category[i] !== v)) continue;
    const val = p.category[depth];
    if (val) counts.set(val, (counts.get(val) || 0) + 1);
  }
  return counts;
}

// Checks whether product p's category path matches the currently selected
// cat1/cat2/cat3 filters (any unset level matches everything at that level).
function matchesCat(p) {
  if (!p) return false;
  if (state.cat1 && p.category[0] !== state.cat1) return false;
  if (state.cat2 && p.category[1] !== state.cat2) return false;
  if (state.cat3 && p.category[2] !== state.cat3) return false;
  return true;
}

function currentCatPath() {
  return [state.cat1, state.cat2, state.cat3].filter(Boolean);
}

function renderCatBtn() {
  const path = currentCatPath();
  const btn = document.getElementById('catBtn');
  btn.textContent = (path.length ? path.join(' › ') : 'All categories') + ' ▾';
  btn.classList.toggle('active', path.length > 0);
}

function applyCatPath(path) {
  state.cat1 = path[0] || null;
  state.cat2 = path[1] || null;
  state.cat3 = path[2] || null;
  closeCatMenu();
  renderCatBtn();
  applyFilters();
  renderDrops();
}

function renderCatMenu() {
  const menu = document.getElementById('catMenu');
  menu.innerHTML = '';
  const depth = menuPath.length;

  if (depth > 0) {
    const back = document.createElement('div');
    back.className = 'cat-row cat-back';
    back.textContent = '‹ Back';
    back.onclick = () => { menuPath.pop(); renderCatMenu(); };
    menu.appendChild(back);

    const label = document.createElement('div');
    label.className = 'cat-path-label';
    label.textContent = menuPath.join(' › ');
    menu.appendChild(label);
  }

  const allRow = document.createElement('div');
  allRow.className = 'cat-row';
  allRow.textContent = depth === 0 ? 'All categories' : `All in ${menuPath[menuPath.length - 1]}`;
  allRow.onclick = () => applyCatPath(menuPath);
  menu.appendChild(allRow);

  const sorted = [...catCounts(depth, menuPath).entries()].sort((a, b) => b[1] - a[1]);
  for (const [name, count] of sorted) {
    const row = document.createElement('div');
    row.className = 'cat-row';
    const nameSpan = document.createElement('span');
    nameSpan.textContent = name;
    const right = document.createElement('span');
    right.className = 'cat-row-right';
    const countSpan = document.createElement('span');
    countSpan.className = 'count';
    countSpan.textContent = count;
    right.appendChild(countSpan);

    const hasChildren = catCounts(depth + 1, [...menuPath, name]).size > 0;
    if (hasChildren) {
      const arrow = document.createElement('span');
      arrow.textContent = '›';
      right.appendChild(arrow);
      row.onclick = () => { menuPath.push(name); renderCatMenu(); };
    } else {
      row.onclick = () => applyCatPath([...menuPath, name]);
    }
    row.appendChild(nameSpan);
    row.appendChild(right);
    menu.appendChild(row);
  }
}

function openCatMenu() {
  const path = currentCatPath();
  menuPath = path.slice(0, Math.max(0, path.length - 1));
  renderCatMenu();
  document.getElementById('catMenu').hidden = false;
  catMenuOpen = true;
}

function closeCatMenu() {
  document.getElementById('catMenu').hidden = true;
  catMenuOpen = false;
}

document.getElementById('catBtn').addEventListener('click', e => {
  e.stopPropagation();
  catMenuOpen ? closeCatMenu() : openCatMenu();
});

document.addEventListener('click', e => {
  if (catMenuOpen && !e.composedPath().includes(document.querySelector('.cat-picker'))) closeCatMenu();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && catMenuOpen) closeCatMenu();
});

document.getElementById('search').addEventListener('input', e => {
  state.query = e.target.value.trim().toLowerCase();
  applyFilters();
});

function applyFilters() {
  if (!INDEX) return;
  let list = INDEX.products.filter(matchesCat);
  if (state.stores.size) {
    list = list.filter(p => p.stores.some(s => state.stores.has(s)));
  }
  if (state.query) {
    const q = state.query;
    list = list.filter(p => p.name.toLowerCase().includes(q) || p.brand.toLowerCase().includes(q));
  }
  document.getElementById('resultCount').textContent =
    `Showing ${Math.min(list.length, 200)} of ${list.length} products`;
  renderResults(list.slice(0, 200));
}

function renderResults(products) {
  const el = document.getElementById('results');
  el.innerHTML = '';
  for (const p of products) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'item' + (p.code === selectedCode ? ' selected' : '');
    btn.innerHTML =
      `<div class="item-row"><div><div class="item-name">${p.name}</div>` +
      `<div class="item-sub">${p.brand} &middot; ${catLabel(p.category)}</div></div>` +
      `<div class="item-price">${priceLabel(p.latest_price_range)}</div></div>` +
      `<div class="badges">${badgeSpans(p.badges)}</div>`;
    btn.onclick = () => selectProduct(p, btn);
    el.appendChild(btn);
  }
}

function selectProduct(p, btnEl) {
  selectedCode = p.code;
  selectedSummary = p;
  document.querySelectorAll('.item.selected').forEach(x => x.classList.remove('selected'));
  if (btnEl) btnEl.classList.add('selected');
  renderDetail(p);
  if (window.innerWidth < 880) {
    document.getElementById('detail').scrollIntoView({ behavior: 'smooth' });
  }
}

function renderDrops() {
  const el = document.getElementById('drops');
  el.innerHTML = '';
  const drops = INDEX.drops.filter(d =>
    (!state.stores.size || state.stores.has(d.store)) && matchesCat(PRODUCT_BY_CODE.get(d.code))
  );
  for (const d of drops.slice(0, 20)) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'item drop-item';
    btn.innerHTML = `<span>${d.name} <small>(${d.store})</small></span>` +
      `<span class="badge drop">-${d.pct.toFixed(0)}% $${d.latest.toFixed(2)}</span>`;
    btn.onclick = () => {
      const p = INDEX.products.find(x => x.code === d.code);
      if (p) selectProduct(p, null);
    };
    el.appendChild(btn);
  }
  if (!drops.length) el.innerHTML = '<div class="item-sub">None match current filters.</div>';
}

function median(nums) {
  const s = [...nums].sort((a, b) => a - b);
  const mid = Math.floor(s.length / 2);
  return s.length % 2 ? s[mid] : (s[mid - 1] + s[mid]) / 2;
}

let chart = null;

async function renderDetail(summary) {
  const el = document.getElementById('detail');
  el.innerHTML = `<h2>${summary.name}</h2><p class="sub-line">${summary.brand} &middot; ${catLabel(summary.category)}</p>` +
    `<div class="detail-loading">Loading price history...</div>`;

  let p;
  try {
    p = await fetch(`./products/${summary.code}.json`).then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.json();
    });
  } catch (err) {
    el.innerHTML += `<div class="detail-error">Failed to load price history: ${err}</div>`;
    return;
  }

  el.innerHTML = `<h2>${p.name}</h2><p class="sub-line">${p.brand} &middot; ${catLabel(p.category)}</p>` +
    `<div class="chips range-chips" id="rangeChips"></div>` +
    `<div class="chart-wrap"><canvas id="chart"></canvas></div><table id="latestTable"></table>`;

  // Series are sparse (a point only when price/promo changed). Extend each
  // store's line to the product's last confirmed-seen date with a flat
  // point, so the stepped chart doesn't visually stop at the last change
  // when the price has simply stayed the same since.
  const seriesEntries = Object.entries(p.series)
    .filter(([sm]) => !state.stores.size || state.stores.has(sm));
  const datasets = seriesEntries.map(([sm, series]) => {
    const points = series.map(pt => ({ x: Date.parse(pt[0]), y: pt[1], offer: pt[2] }));
    const last = series[series.length - 1];
    if (summary.last_seen && last[0] < summary.last_seen) {
      points.push({ x: Date.parse(summary.last_seen), y: last[1], offer: last[2] });
    }
    return {
      label: sm, data: points, stepped: true,
      borderColor: storeColor(sm), fill: false,
      borderWidth: 2, pointRadius: 0, pointHoverRadius: 4, pointHitRadius: 12,
      pointHoverBackgroundColor: storeColor(sm),
    };
  });

  function rangeWindow() {
    const days = RANGES[chartRange];
    if (days == null) return { min: undefined, max: undefined };
    const lastX = Math.max(...datasets.flatMap(d => d.data.map(pt => pt.x)));
    return { min: lastX - days * 864e5, max: lastX };
  }

  function renderRangeChips() {
    const el = document.getElementById('rangeChips');
    el.innerHTML = '';
    for (const key of Object.keys(RANGES)) {
      const chip = makeChip(key, null, key === chartRange);
      chip.onclick = () => {
        chartRange = key;
        const { min, max } = rangeWindow();
        chart.options.scales.x.min = min;
        chart.options.scales.x.max = max;
        chart.update();
        renderRangeChips();
      };
      el.appendChild(chip);
    }
  }
  renderRangeChips();

  if (chart) chart.destroy();
  const initWindow = rangeWindow();
  chart = new Chart(document.getElementById('chart'), {
    type: 'line',
    data: { datasets },
    plugins: [crosshair],
    options: {
      parsing: false,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      scales: {
        x: {
          type: 'time', time: { tooltipFormat: 'yyyy-MM-dd' },
          min: initWindow.min, max: initWindow.max,
          grid: { display: false }, border: { display: false },
          ticks: { color: cssVar('--muted'), maxRotation: 0, maxTicksLimit: 6 },
        },
        y: {
          beginAtZero: false,
          grid: { color: cssVar('--border') }, border: { display: false },
          ticks: { color: cssVar('--muted'), maxTicksLimit: 5, callback: v => '$' + v },
        },
      },
      plugins: {
        legend: {
          position: 'bottom',
          labels: { usePointStyle: true, pointStyle: 'line', color: cssVar('--fg'), padding: 16 },
        },
        tooltip: {
          backgroundColor: cssVar('--card-bg'), borderColor: cssVar('--border'), borderWidth: 1,
          titleColor: cssVar('--fg'), bodyColor: cssVar('--fg'), padding: 10, cornerRadius: 8,
          usePointStyle: true, boxPadding: 4,
          callbacks: {
            label: ctx => `${ctx.dataset.label}: $${ctx.parsed.y.toFixed(2)}` +
              (ctx.raw.offer ? ` — ${ctx.raw.offer}` : ''),
          },
        },
      },
    },
  });

  const fake = new Set(summary.badges.filter(b => b.startsWith('fake:')).map(b => b.split(':')[1]));
  const rows = seriesEntries.map(([sm, series]) => {
    const latest = series[series.length - 1];
    const med = median(series.map(pt => pt[1]));
    const badge = fake.has(sm) ? '<span class="badge fake">fake discount</span>' : '';
    const offer = latest[2] || '';
    return `<tr><td>${sm}</td><td class="num">$${latest[1].toFixed(2)}</td><td class="num">$${med.toFixed(2)}</td>` +
      `<td class="promo" title="${offer}">${offer}</td><td>${badge}</td></tr>`;
  }).join('');
  document.getElementById('latestTable').innerHTML =
    '<tr><th>Chain</th><th class="num">Latest</th><th class="num">Series median</th><th>Offer</th><th></th></tr>' + rows;
}
</script>
</body>
</html>
