name: daily-prices

on:
  schedule:
    - cron: "30 2 * * *" # 10:30 HKT, after OPW's daily update
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - run: python3 grocery-price-history/backfill.py --update

      - name: Commit new snapshots + site data
        run: |
          cd grocery-price-history
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add raw/ products.json names_tc.json
          git diff --cached --quiet || git commit -m "raw: daily price snapshot [skip ci]"
          git pull --rebase origin main
          git push

      - name: Build Pages artifact
        run: |
          mkdir dist
          cp grocery-price-history/index.html dist/
          python3 grocery-price-history/backfill.py --export-site dist

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
